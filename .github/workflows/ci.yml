name: CI - descuentos - unit tests

on:
  push:
    branches:
      - ci
  pull_request:
    branches:
      - main

jobs:
  unit-tests:
    name: Unit tests (descuentos)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 23 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "23"

      - name: Cache local Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: List pom.xml files (diagnostic)
        run: |
          find . -maxdepth 4 -name pom.xml -print

      - name: Run unit tests (maven)
        run: |
          if [ -f mvnw ]; then
            chmod +x mvnw
            ./mvnw -B -ntp test -f pom.xml
          else
            mvn -B -ntp test -f pom.xml
          fi
